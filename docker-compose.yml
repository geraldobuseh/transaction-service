services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transaction-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      MSSQL_PID: "${MSSQL_PID:-Developer}"
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - transaction-sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=/opt/mssql-tools18/bin/sqlcmd; [ -x $$SQLCMD ] || SQLCMD=/opt/mssql-tools/bin/sqlcmd; $$SQLCMD -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\""
        ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 30

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      DB_NAME: "${DB_NAME:?DB_NAME is required}"
    entrypoint:
      - bash
      - -c
    command:
      - |
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        [ -x "$$SQLCMD" ] || SQLCMD=/opt/mssql-tools/bin/sqlcmd
        "$$SQLCMD" -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "IF DB_ID(N'$$DB_NAME') IS NULL BEGIN DECLARE @sql nvarchar(max) = N'CREATE DATABASE ' + QUOTENAME(N'$$DB_NAME'); EXEC(@sql); END"
    restart: "no"

  kafka:
    image: apache/kafka:3.9.0
    container_name: transaction-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    volumes:
      - transaction-kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-service-app
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://${DB_HOST_DOCKER:-sqlserver}:1433;databaseName=${DB_NAME:?DB_NAME is required};encrypt=true;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME:?DB_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:9092}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:-3600000}"
      CONFIG_VALIDATION_ENABLED: "${CONFIG_VALIDATION_ENABLED:-true}"
      APP_TIME_ZONE: "${APP_TIME_ZONE:-America/Chicago}"
      TZ: "${APP_TIME_ZONE:-America/Chicago}"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: transaction-service-frontend
    working_dir: /app
    depends_on:
      - app
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
      VITE_BACKEND_PROXY_TARGET: "${VITE_BACKEND_PROXY_TARGET_DOCKER:-http://app:8080}"
    volumes:
      - ./frontend:/app
      - transaction-frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  transaction-sqlserver-data:
    name: transaction-sqlserver-data
  transaction-frontend-node-modules:
    name: transaction-frontend-node-modules
  transaction-kafka-data:
    name: transaction-kafka-data
