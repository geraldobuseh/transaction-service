services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transaction-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPass123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - transaction-sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=/opt/mssql-tools18/bin/sqlcmd; [ -x $$SQLCMD ] || SQLCMD=/opt/mssql-tools/bin/sqlcmd; $$SQLCMD -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\""
        ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 30

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "StrongPass123!"
    volumes:
      - ./docker/init-db.sql:/init-db.sql:ro
    entrypoint:
      - bash
      - -c
    command:
      - |
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        [ -x "$$SQLCMD" ] || SQLCMD=/opt/mssql-tools/bin/sqlcmd
        "$$SQLCMD" -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -i /init-db.sql
    restart: "no"

  kafka:
    image: apache/kafka:3.9.0
    container_name: transaction-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9094:9094"
    volumes:
      - transaction-kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-service-app
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=transactionsdb;encrypt=true;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "StrongPass123!"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      APP_TIME_ZONE: "America/Chicago"
      TZ: "America/Chicago"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: transaction-service-frontend
    working_dir: /app
    depends_on:
      - app
    environment:
      VITE_BACKEND_PROXY_TARGET: "http://app:8080"
    volumes:
      - ./frontend:/app
      - transaction-frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  transaction-sqlserver-data:
    name: transaction-sqlserver-data
  transaction-frontend-node-modules:
    name: transaction-frontend-node-modules
  transaction-kafka-data:
    name: transaction-kafka-data
