spring:
  jackson:
    time-zone: America/Chicago
  datasource:
    url: jdbc:h2:mem:transaction_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false

jwt:
  secret: test-jwt-secret-with-at-least-thirty-two-characters
  expiration: 3600000

app:
  config:
    validation:
      enabled: false

